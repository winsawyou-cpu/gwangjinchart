<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>광진구 데이터 리포트 시스템</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    <!-- Prop-Types (Required by Recharts UMD) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <!-- Recharts (UMD) -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, Cell, LabelList 
        } = window.Recharts;

        // 인라인 아이콘 컴포넌트 (JSX Fragment 오류 수정 완료)
        const Icon = ({ name, className }) => {
            const icons = {
                dashboard: <path d="M3 3h7v9H3V3zm11 0h7v5h-7V3zm0 9h7v9h-7v-9zm-11 11h7v-7H3v7z" />,
                download: <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4m4-5 5 5 5-5m-5 5V3" />,
                rotate: <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8m0-5v5h5" />,
                file: (
                    <>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" />
                        <polyline points="14 2 14 8 20 8" />
                    </>
                ),
                check: (
                    <>
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                        <polyline points="22 4 12 14.01 9 11.01" />
                    </>
                ),
                info: (
                    <>
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="16" x2="12" y2="12" />
                        <line x1="12" y1="8" x2="12.01" y2="8" />
                    </>
                ),
                loader: <path d="M12 2v4m0 12v4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83M2 12h4m12 0h4M4.93 19.07l2.83-2.83m8.48-8.48l2.83-2.83" />
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const GWANGJIN_DONGS = [
            '중곡1동', '중곡2동', '중곡3동', '중곡4동', '능동', 
            '구의1동', '구의2동', '구의3동', '광장동', '자양1동', 
            '자양2동', '자양3동', '자양4동', '화양동', '군자동'
        ];

        const CustomLabel = (props) => {
            const { x, y, width, value, payload, highlight } = props;
            const isHigh = payload?.name === highlight;
            if (value === 0 || value === undefined) return null;

            return (
                <text
                    x={x + width / 2}
                    y={y - 12}
                    textAnchor="middle"
                    fill={isHigh ? '#3730a3' : '#6366f1'}
                    style={{ 
                        fontSize: isHigh ? '14px' : '11px', 
                        fontWeight: isHigh ? '800' : '600',
                        opacity: isHigh ? 1 : 0.8
                    }}
                >
                    {value.toLocaleString()}
                </text>
            );
        };

        const App = () => {
            const exportRef = useRef(null);
            const [reportTitle, setReportTitle] = useState('2026 광진구 주요 행정 지표 분석');
            const [unit, setUnit] = useState('명');
            const [highlightedDong, setHighlightedDong] = useState('광장동');
            const [isGenerating, setIsGenerating] = useState(false);
            const [windowWidth, setWindowWidth] = useState(window.innerWidth);
            const [data, setData] = useState(
                GWANGJIN_DONGS.map(dong => ({ name: dong, value: Math.floor(Math.random() * 800) + 200 }))
            );

            useEffect(() => {
                const handleResize = () => setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const handleDataUpdate = (index, rawValue) => {
                const numericValue = parseInt(rawValue.replace(/[^0-9]/g, '')) || 0;
                const newData = [...data];
                newData[index].value = Math.max(0, numericValue);
                setData(newData);
            };

            const randomizeData = () => {
                setData(GWANGJIN_DONGS.map(dong => ({ name: dong, value: Math.floor(Math.random() * 900) + 100 })));
            };

            const exportImage = async (format) => {
                if (!exportRef.current || isGenerating) return;
                const svgElement = exportRef.current.querySelector('svg');
                if (!svgElement) return;

                setIsGenerating(true);

                try {
                    const width = exportRef.current.clientWidth;
                    const height = exportRef.current.clientHeight;
                    const serializer = new XMLSerializer();
                    let sourceXml = serializer.serializeToString(svgElement);
                    
                    if (!sourceXml.match(/^<svg[^>]+xmlns="http\:\/\/www\.w3\.org\/2000\/svg"/)) {
                        sourceXml = sourceXml.replace(/^<svg/, '<svg xmlns="http://www.w3.org/2000/svg"');
                    }

                    if (format === 'svg') {
                        const blob = new Blob(['<?xml version="1.0" standalone="no"?>\r\n' + sourceXml], { type: 'image/svg+xml;charset=utf-8' });
                        const url = URL.createObjectURL(blob);
                        triggerDownload(url, `${reportTitle}.svg`);
                    } else {
                        const scale = 3;
                        const canvas = document.createElement('canvas');
                        canvas.width = width * scale;
                        canvas.height = height * scale;
                        const ctx = canvas.getContext('2d');
                        
                        const img = new Image();
                        const svgBlob = new Blob([sourceXml], { type: 'image/svg+xml;charset=utf-8' });
                        const url = URL.createObjectURL(svgBlob);

                        img.onload = () => {
                            ctx.scale(scale, scale);
                            ctx.fillStyle = '#ffffff';
                            ctx.fillRect(0, 0, width, height);
                            ctx.drawImage(img, 0, 0);
                            
                            canvas.toBlob((blob) => {
                                if (blob) {
                                    const jpgUrl = URL.createObjectURL(blob);
                                    triggerDownload(jpgUrl, `${reportTitle}.jpg`);
                                }
                                URL.revokeObjectURL(url);
                            }, 'image/jpeg', 0.95);
                        };
                        img.src = url;
                    }
                } catch (error) {
                    console.error("Export failed:", error);
                    setIsGenerating(false);
                }
            };

            const triggerDownload = (url, fileName) => {
                const link = document.createElement("a");
                link.href = url;
                link.download = fileName;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                    setIsGenerating(false);
                }, 1000);
            };

            const isMobile = windowWidth < 640;

            return (
                <div className="min-h-screen pb-20">
                    <nav className="bg-slate-900 text-white px-4 py-4 sm:px-6 flex items-center justify-between shadow-lg mb-6 sm:mb-8 sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <Icon name="dashboard" className="w-5 h-5 sm:w-6 sm:h-6 text-indigo-400" />
                            <h1 className="text-lg sm:text-xl font-bold tracking-tight">Gwangjin <span className="text-indigo-400">Dash</span></h1>
                        </div>
                        <div className="hidden sm:flex items-center gap-4 text-sm font-medium text-slate-300">
                            <span className="flex items-center gap-1"><Icon name="check" className="w-4 h-4 text-green-400" /> Report Optimized</span>
                            <span className="bg-slate-800 px-3 py-1 rounded-full text-xs font-bold">v3.1 Final Fix</span>
                        </div>
                    </nav>

                    <div className="max-w-6xl mx-auto px-4 grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8">
                        <div className="lg:col-span-4 space-y-6 order-2 lg:order-1">
                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6">
                                <div className="flex items-center gap-2 mb-6 pb-2 border-b border-slate-100">
                                    <Icon name="file" className="w-5 h-5 text-indigo-600" />
                                    <h2 className="font-bold text-slate-800 tracking-tight">보고서 기본 설정</h2>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider">메인 제목</label>
                                        <input type="text" value={reportTitle} onChange={(e) => setReportTitle(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wider">단위</label>
                                            <input type="text" value={unit} onChange={(e) => setUnit(e.target.value)} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm outline-none focus:border-indigo-500" />
                                        </div>
                                        <div>
                                            <label className="block text-[11px] font-bold text-indigo-600 mb-1 uppercase tracking-wider">강조 지역</label>
                                            <select value={highlightedDong} onChange={(e) => setHighlightedDong(e.target.value)} className="w-full bg-indigo-50 border border-indigo-200 text-indigo-700 font-bold rounded-xl px-4 py-2.5 text-sm outline-none cursor-pointer">
                                                {GWANGJIN_DONGS.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            </section>

                            <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6">
                                <div className="flex items-center justify-between mb-4">
                                    <h2 className="font-bold text-slate-800 flex items-center gap-2">
                                        <Icon name="dashboard" className="w-5 h-5 text-indigo-600" /> 데이터 실시간 편집
                                    </h2>
                                    <button onClick={randomizeData} className="text-slate-400 hover:text-indigo-600 p-2 rounded-lg hover:bg-slate-100 transition-all"><Icon name="rotate" className="w-4 h-4" /></button>
                                </div>
                                <div className="grid grid-cols-2 gap-3 max-h-[350px] overflow-y-auto pr-1 custom-scrollbar">
                                    {data.map((item, idx) => (
                                        <div key={item.name} className={`p-3 rounded-xl border transition-all ${item.name === highlightedDong ? 'bg-indigo-50 border-indigo-200 shadow-sm ring-1 ring-indigo-200' : 'bg-white border-slate-100'}`}>
                                            <label className="block text-[10px] font-bold text-slate-400 mb-1">{item.name}</label>
                                            <input type="text" value={item.value} onChange={(e) => handleDataUpdate(idx, e.target.value)} className="w-full bg-transparent border-none p-0 text-sm font-bold outline-none text-slate-700 focus:ring-0" />
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>

                        <div className="lg:col-span-8 space-y-4 order-1 lg:order-2">
                            <div className="flex flex-col sm:flex-row gap-3">
                                <button onClick={() => exportImage('jpg')} disabled={isGenerating} className="flex-1 flex items-center justify-center gap-2 bg-indigo-600 text-white px-6 py-4 rounded-2xl text-sm font-bold shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-95 disabled:opacity-70">
                                    {isGenerating ? <Icon name="loader" className="w-4 h-4 animate-spin" /> : <Icon name="download" className="w-4 h-4" />}
                                    보고서 이미지 저장 (JPG)
                                </button>
                                <button onClick={() => exportImage('svg')} disabled={isGenerating} className="flex items-center justify-center gap-2 bg-slate-200 text-slate-700 px-6 py-4 rounded-2xl text-sm font-bold hover:bg-slate-300 transition-all active:scale-95">
                                    SVG(벡터) 저장
                                </button>
                            </div>

                            <div className="relative">
                                <div ref={exportRef} className="bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden aspect-[4/3] min-h-[500px] sm:min-h-[600px] transition-all">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={data} margin={{ top: 130, right: 40, left: 10, bottom: 60 }} barSize={isMobile ? 18 : 32}>
                                            <text x="50%" y="50" textAnchor="middle" fill="#1e293b" style={{ fontSize: isMobile ? '20px' : '28px', fontWeight: '900', letterSpacing: '-0.02em' }}>{reportTitle}</text>
                                            <text x="50%" y="85" textAnchor="middle" fill="#64748b" style={{ fontSize: isMobile ? '12px' : '14px', fontWeight: '500' }}>단위: {unit} | 데이터 기준일: {new Date().toLocaleDateString('ko-KR')}</text>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" axisLine={{ stroke: '#e2e8f0' }} tickLine={false} tick={{ fill: '#64748b', fontSize: isMobile ? 10 : 12, fontWeight: 500 }} interval={0} angle={-45} textAnchor="end" height={80} />
                                            <YAxis axisLine={false} tickLine={false} tick={{ fill: '#94a3b8', fontSize: 10 }} tickFormatter={(v) => v.toLocaleString()} />
                                            <Tooltip cursor={{ fill: 'rgba(79, 70, 229, 0.05)' }} contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 10px 25px rgba(0,0,0,0.1)', padding: '12px' }} />
                                            <Bar dataKey="value" radius={[6, 6, 0, 0]} animationDuration={1000}>
                                                {data.map((entry, index) => (
                                                    <Cell key={index} fill={entry.name === highlightedDong ? '#4f46e5' : '#a5b4fc'} />
                                                ))}
                                                <LabelList dataKey="value" content={<CustomLabel highlight={highlightedDong} />} />
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                {isGenerating && (
                                    <div className="absolute inset-0 bg-white/60 backdrop-blur-[2px] flex flex-col items-center justify-center rounded-3xl z-10">
                                        <Icon name="loader" className="w-10 h-10 text-indigo-600 animate-spin mb-3" />
                                        <p className="font-bold text-slate-800">고해상도 리포트 생성 중...</p>
                                    </div>
                                )}
                            </div>

                            <div className="bg-indigo-50 border border-indigo-100 p-5 rounded-2xl flex items-start gap-3">
                                <Icon name="info" className="w-5 h-5 text-indigo-500 mt-0.5 shrink-0" />
                                <div className="text-xs text-indigo-800 leading-relaxed">
                                    <p className="font-bold mb-1">HTML 단독 실행 파일 안내:</p>
                                    JSX 문법 오류를 수정하여 인접한 요소들을 Fragment로 감쌌습니다. 이제 모든 브라우저에서 오류 없이 대시보드가 정상적으로 작동합니다.
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
